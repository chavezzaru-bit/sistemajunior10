<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <title>SuperVentas | POS & Cotizaciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: '#10b981', 'primary-dark': '#059669' } } }
        }
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(16, 185, 129, 0.3); border-radius: 6px; }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb { background: rgba(16, 185, 129, 0.5); }
    </style>
    <script>
        window.onerror = function(msg, url, line, col, err) {
            alert("Error: " + msg + " (Línea: " + line + ")");
        };
        window.addEventListener('unhandledrejection', function(event) {
            alert("Error Promesa: " + (event.reason ? event.reason.message || event.reason : "desconocido"));
        });
    </script>    
    <style>
        .module-section { display: none; animation: fadeIn 0.3s ease-in-out; }
        .module-section.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 min-h-screen flex overflow-x-hidden overflow-y-auto md:overflow-hidden flex-col md:flex-row">

    <!-- Splash Screen -->
    <div id="splash-screen" class="fixed inset-0 bg-white dark:bg-gray-900 z-[9999] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="bg-emerald-500 w-24 h-24 rounded-3xl flex items-center justify-center shadow-xl mb-6">
            <svg class="w-12 h-12 text-white animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2 tracking-tight">SuperVentas</h1>
        <p class="text-gray-500 dark:text-gray-400 font-medium">Iniciando sistema...</p>
    </div>

    <!-- Login Section -->
    <div id="auth-section" class="hidden fixed inset-0 z-50 bg-gray-50 dark:bg-gray-900 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 p-10 rounded-[2rem] shadow-2xl w-full max-w-md border border-gray-100 dark:border-gray-700 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-emerald-500"></div>
            <div class="bg-emerald-50 dark:bg-emerald-900/30 w-20 h-20 rounded-2xl mx-auto flex items-center justify-center mb-6">
                <svg class="w-10 h-10 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Bienvenido</h1>
            <p class="text-gray-500 dark:text-gray-400 text-sm mb-8">Ingresa tus credenciales para acceder</p>
            <div class="space-y-4">
                <input type="email" id="login-email" placeholder="ejemplo@correo.com" class="w-full px-5 py-4 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                <input type="password" id="login-password" placeholder="Contraseña" class="w-full px-5 py-4 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                <button onclick="login()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-4 mt-2 rounded-xl shadow-lg hover:shadow-xl transition-all active:scale-95">Ingresar al Sistema</button>
            </div>
        </div>
    </div>

    <!-- App Sidebar -->
    <aside class="w-64 bg-white dark:bg-gray-950 flex-shrink-0 flex flex-col border-r border-gray-200 dark:border-gray-800 z-40 hidden md:flex">
        <!-- Logo Header -->
        <div class="p-6 border-b border-gray-100 dark:border-gray-800 flex items-center gap-4">
             <div class="w-10 h-10 bg-emerald-500 text-white rounded-xl flex items-center justify-center text-lg font-bold shadow-md">
                 SV
             </div>
             <div>
                 <h1 class="text-base font-bold text-gray-900 dark:text-white tracking-tight leading-tight">SuperVentas</h1>
                 <p class="text-[9px] text-gray-400 uppercase tracking-widest font-semibold">Terminal POS</p>
             </div>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 overflow-y-auto px-4 py-6 space-y-2 custom-scrollbar">
            <button onclick="changeModule('sales')" id="nav-sales" class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-emerald-600 bg-emerald-50 dark:bg-emerald-900/20 font-medium transition-all group">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                Punto de Venta
            </button>
            
            <button onclick="changeModule('quotes')" id="nav-quotes" class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800/50 hover:text-gray-900 dark:hover:text-white transition-all group">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Cotizaciones
            </button>

            <button onclick="changeModule('history')" id="nav-history" class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800/50 hover:text-gray-900 dark:hover:text-white transition-all group">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Historial / Recibos
            </button>
        </nav>

        <!-- Footer Sidebar -->
        <div class="p-6 border-t border-gray-100 dark:border-gray-800">
            <div class="flex items-center justify-between mb-4">
                <button onclick="toggleTheme()" class="p-2 rounded-lg bg-gray-50 dark:bg-gray-800 text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors" title="Cambiar Tema">
                     <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
                <button onclick="logout()" class="text-xs font-bold text-red-500 hover:text-red-600 uppercase tracking-widest transition-colors">
                      SALIR
                </button>
            </div>
            <div class="flex items-center gap-3 bg-gray-50 dark:bg-gray-900/50 p-3 rounded-xl border border-gray-100 dark:border-gray-800">
                <div class="w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center text-white font-bold text-xs">US</div>
                <div class="overflow-hidden">
                    <p class="text-xs font-bold text-gray-900 dark:text-white truncate">Caja Principal</p>
                    <p class="text-[10px] text-gray-500 truncate">Vendedor Activo</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Mobile Header -->
    <header class="md:hidden flex items-center justify-between p-4 bg-white dark:bg-gray-950 border-b border-gray-200 dark:border-gray-800 z-30 shadow-sm w-full absolute top-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-emerald-500 text-white rounded-lg flex items-center justify-center font-bold text-sm">SV</div>
            <h1 class="font-bold text-gray-900 dark:text-white text-sm">SuperVentas</h1>
        </div>
        <button onclick="toggleTheme()" class="text-gray-500 mr-2 p-1">
             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col min-h-full md:h-full relative bg-gray-50/50 dark:bg-gray-900/50 pt-16 pb-20 md:pt-0 md:pb-0">
        <!-- Contenedor Principal -->
        <div class="flex-1 overflow-visible md:overflow-hidden relative w-full min-h-full md:h-full" id="main-container">
            <!-- Módulo Punto de Venta (Sales) -->
            <div id="module-sales" class="module-section active w-full min-h-full md:h-full">
                <!-- Se inyecta desde sales.js -->
            </div>

            <!-- Módulo Cotizaciones (Quotes) -->
            <div id="module-quotes" class="module-section w-full min-h-full md:h-full">
                <!-- Se inyecta desde quotes.js -->
            </div>

            <!-- Módulo Historial / Recibos (Receipts) -->
            <div id="module-history" class="module-section w-full min-h-full md:h-full">
                <!-- Se inyecta desde receipts.js -->
            </div>
        </div>
    </main>

    <!-- Bottom Navigation for Mobile -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-950 border-t border-gray-200 dark:border-gray-800 z-40 px-6 py-3 flex justify-between items-center pb-safe">
        <button onclick="changeModule('sales')" id="nav-sales-mobile" class="flex flex-col items-center gap-1 text-emerald-600 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            <span class="text-[10px] font-medium">POS</span>
        </button>
        <button onclick="changeModule('quotes')" id="nav-quotes-mobile" class="flex flex-col items-center gap-1 text-gray-400 hover:text-emerald-500 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <span class="text-[10px] font-medium">Coti</span>
        </button>
        <button onclick="changeModule('history')" id="nav-history-mobile" class="flex flex-col items-center gap-1 text-gray-400 hover:text-emerald-500 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[10px] font-medium">Recibos</span>
        </button>
    </nav>

    <!-- Scripts -->
    <script src="app.js"></script>
    <script src="sales.js"></script>
    <script src="quotes.js"></script>
    <script src="receipts.js"></script>

</body>
</html>
